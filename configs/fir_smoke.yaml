experiment_name: fir_tags_grand_smoke
output_root: outputs

system:
  device: cpu
  num_workers: 8
  torch_threads_per_worker: 1
  seed: 20260411

nr:
  k: 1088
  n: 1344
  bits_per_symbol: 4
  num_ofdm_symbols: 14
  fft_size: 24
  cyclic_prefix_length: 0
  subcarrier_spacing_hz: 30000.0
  num_guard_carriers: [0, 0]
  dc_null: false

channel:
  mode: tdl
  delay_profile: C300
  delay_spread_s: 3.0e-7
  carrier_frequency_hz: 3.5e9
  min_speed_mps: 2.0
  max_speed_mps: 8.33
  perfect_csi_equalization: true
  eps_equalizer: 1.0e-8

simulation:
  ebn0_db_list: [6.0]
  train_frames_per_worker_per_snr: 8
  eval_frames_per_worker_per_snr: 12
  sampled_failure_traces_per_worker_per_snr: 3

legacy_ldpc:
  num_iter: 8
  cn_update: minsum
  cn_schedule: layered
  llr_max: 8.0
  early_stop: true

grand:
  topk_bits: 48
  individual_init_width: 24
  query_cap: 500
  max_primitives_in_pattern: 6
  max_group_count: 8
  search_expand_width: 6
  overlap_penalty: 0.35
  group_bonus_log_size: 0.10
  keep_oracle_upper_bound: true

training:
  snapshot_hidden_dims: [32, 16]
  bit_hidden_dims: [48, 32]
  epochs: 3
  batch_size: 512
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  neg_to_pos_ratio: 4
  validation_fraction: 0.2

report:
  query_quantiles: [0.5, 0.9, 0.99]
